<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedagem Maquinistas - VIC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004b87">
    <style>
        :root {
            /* Cores VLI */
            --vli-blue: #004b87;
            --vli-blue-hover: #003a6b;
            --vli-orange: #f26a21;
            --vli-orange-hover: #d95e1c;
            
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-light: #718096;
            --border-color: #e2e8f0;
        }

        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
        }
        
        .logo-area { margin-bottom: 30px; }
        
        .logo-img {
            max-width: 140px;
            height: auto;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: var(--text-main); 
            letter-spacing: -0.5px;
        }
        
        p.subtitle { 
            color: var(--text-light); 
            font-size: 14px; 
            line-height: 1.5; 
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            font-size: 16px; 
            background-color: #f8fafc; 
            transition: all 0.3s ease; 
            text-align: center; 
            font-weight: 600; 
            letter-spacing: 1px; 
            margin-bottom: 20px;
        }
        
        input[type="text"]:focus { 
            outline: none; 
            border-color: var(--vli-blue); 
            background-color: #fff; 
            box-shadow: 0 0 0 4px rgba(0, 75, 135, 0.1); 
        }
        
        /* Grid de Hotéis */
        .hotel-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin: 20px 0; 
        }
        
        .hotel-card { 
            border: 2px solid var(--border-color); 
            padding: 16px 8px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px; 
            transition: all 0.2s ease; 
            background: #fff; 
            color: var(--text-light); 
        }
        
        .hotel-card:hover { border-color: #cbd5e1; }
        
        .hotel-card.selected { 
            border-color: var(--vli-blue); 
            background: rgba(0, 75, 135, 0.04); 
            color: var(--vli-blue); 
        }
        
        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        
        .btn-primary { 
            background-color: var(--vli-blue); 
            color: white; 
            box-shadow: 0 4px 12px rgba(0, 75, 135, 0.15);
        }
        
        .btn-primary:hover { 
            background-color: var(--vli-blue-hover); 
            transform: translateY(-1px);
        }
        
        .btn-warning { 
            background-color: var(--vli-orange); 
            color: white; 
            box-shadow: 0 4px 12px rgba(242, 106, 33, 0.15);
        }
        
        .btn-warning:hover { 
            background-color: var(--vli-orange-hover); 
            transform: translateY(-1px);
        }
        
        button:disabled { 
            background-color: #e2e8f0 !important; 
            color: #94a3b8 !important; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        .status-badge { 
            background: rgba(242, 106, 33, 0.05); 
            border: 1px solid rgba(242, 106, 33, 0.2); 
            color: var(--vli-orange-hover); 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 15px; 
            margin-bottom: 24px; 
        }
        
        .hidden { display: none !important; }
        
        /* Balão/Banner de Instalação PWA */
        .install-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: #ffffff;
            padding: 18px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-left: 5px solid var(--vli-orange);
            z-index: 9999;
            text-align: left;
        }
        .install-banner h4 {
            font-size: 15px;
            color: var(--vli-blue);
            font-weight: 700;
            margin-bottom: 4px;
        }
        .install-banner p {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.4;
        }
        .install-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            width: auto;
            padding: 0;
        }
        .btn-install-now {
            background-color: var(--vli-orange);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            width: auto;
            display: inline-flex;
            box-shadow: 0 2px 6px rgba(242, 106, 33, 0.2);
        }
        .btn-install-now:hover { background-color: var(--vli-orange-hover); }

        /* Animações */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .spinner { 
            width: 20px; 
            height: 20px; 
            border: 3px solid rgba(255,255,255,0.3); 
            border-top-color: #fff; 
            border-radius: 50%; 
            animation: runSpin 0.8s linear infinite; 
            display: none; 
        }
        
        @keyframes runSpin { to { transform: rotate(360deg); } }
        .loading .spinner { display: inline-block; }
        .loading .btn-text-content { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="card fade-in">
        <div class="logo-area">
            <img src="logo-pwa.png" alt="Logo VLI" class="logo-img" onerror="this.style.display='none'">
            <h2>Portal VIC</h2>
            <p class="subtitle" id="login-status-text">Conectando ao sistema...</p>
        </div>
        <input type="text" id="matricula-input" placeholder="Digite seu ID / Matrícula" disabled>
        <button id="login-btn" class="btn-primary" onclick="efetuarLogin()" disabled>Acessar</button>
    </div>

    <div id="main-screen" class="card hidden">
        <div class="logo-area">
            <h2>Olá, <span id="nome-usuario" style="color: var(--vli-blue);"></span></h2>
            <p class="subtitle">ID: <span id="id-usuario"></span></p>
        </div>
        
        <div id="box-checkin" class="fade-in">
            <p style="font-size: 14px; color: var(--text-light); text-align: left; margin: 0 0 8px 4px; font-weight: 500;">Selecione o Hotel:</p>
            <div class="hotel-grid">
                <div class="hotel-card selected" id="card-sb" onclick="selecionarHotel('Santa Bárbara')">Santa Bárbara</div>
                <div class="hotel-card" id="card-res" onclick="selecionarHotel('Resplendor')">Resplendor</div>
            </div>
            <button id="btn-checkin" class="btn-primary" onclick="enviarRegistro('Check-in')">
                <div class="spinner"></div>
                <span class="btn-text-content">Confirmar Check-in</span>
            </button>
        </div>

        <div id="box-checkout" class="hidden fade-in">
            <div class="status-badge">
                Hospedado em:<br><span id="hotel-atual-nome" style="font-size: 18px; margin-top: 4px; display: block;"></span>
            </div>
            <button id="btn-checkout" class="btn-warning" onclick="enviarRegistro('Check-out')">
                <div class="spinner"></div>
                <span class="btn-text-content">Realizar Check-out</span>
            </button>
        </div>
    </div>

    <div id="install-banner" class="install-banner hidden fade-in">
        <button class="install-close" onclick="fecharBannerInstall()">×</button>
        <h4>Instalar Aplicativo</h4>
        <p id="install-instructions">Adicione o app à sua tela inicial para um acesso mais rápido e uso simplificado.</p>
        <button id="btn-install-pwa" class="btn-install-now hidden" onclick="dispararInstalacao()">Instalar agora</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHnH_dSbASWY8ekHq_1uWixdUo29jj6iXj_h4HLUvvFpKkWuJDY5Lsi42cZMoAO_hZtg/exec";

        let dbFuncionarios = [];
        let hotelSelecionado = "Santa Bárbara";
        let deferredPrompt;

        window.addEventListener('load', () => {
            verificarSessaoAtiva();
            inicializarInstalacaoPWA();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(e => console.log(e));
            }
        });

        // Gerencia as instruções de instalação do Web App baseadas no aparelho
        function inicializarInstalacaoPWA() {
            const installBanner = document.getElementById('install-banner');
            const installInstructions = document.getElementById('install-instructions');
            const btnInstallPwa = document.getElementById('btn-install-pwa');

            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
            if (isStandalone) return; // Já está instalado, não exibe nada.

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isIOS) {
                // Configuração customizada para dispositivos Apple
                installInstructions.innerHTML = "Toque no ícone de <strong>Compartilhar</strong> (quadrado com uma seta para cima) e selecione <strong>'Adicionar à Tela de Início'</strong>.";
                installBanner.classList.remove('hidden');
            } else {
                // Captura o evento nativo do Android/Chrome
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    installInstructions.innerText = "Adicione o Portal VIC à sua tela inicial para bater o check-in de forma estável e rápida.";
                    btnInstallPwa.classList.remove('hidden');
                    installBanner.classList.remove('hidden');
                });
            }
        }

        function dispararInstalacao() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    fecharBannerInstall();
                }
                deferredPrompt = null;
            });
        }

        function fecharBannerInstall() {
            document.getElementById('install-banner').classList.add('hidden');
        }

        function verificarSessaoAtiva() {
            const savedId = localStorage.getItem('h_id');
            const savedNome = localStorage.getItem('h_nome');

            if (savedId && savedNome) {
                gerenciarTelas();
            } else {
                carregarFuncionarios();
            }
        }

        function carregarFuncionarios() {
            fetch(`${WEB_APP_URL}?action=getFuncionarios`)
                .then(res => res.json())
                .then(data => {
                    dbFuncionarios = data;
                    document.getElementById('login-status-text').innerText = "Insira suas credenciais para acessar.";
                    document.getElementById('matricula-input').disabled = false;
                    document.getElementById('login-btn').disabled = false;
                })
                .catch(err => {
                    document.getElementById('login-status-text').innerText = "Erro de conexão. Tente novamente.";
                    console.error(err);
                });
        }

        function gerenciarTelas() {
            const savedId = localStorage.getItem('h_id');
            const savedNome = localStorage.getItem('h_nome');
            const savedStatus = localStorage.getItem('h_status');
            const savedHotel = localStorage.getItem('h_hotel');

            if (savedId && savedNome) {
                document.getElementById('login-screen').classList.add('hidden');
                const mainScreen = document.getElementById('main-screen');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('fade-in');
                
                document.getElementById('nome-usuario').innerText = savedNome;
                document.getElementById('id-usuario').innerText = savedId;

                if (savedStatus === 'Check-in') {
                    document.getElementById('box-checkin').classList.add('hidden');
                    document.getElementById('box-checkout').classList.remove('hidden');
                    document.getElementById('hotel-atual-nome').innerText = savedHotel;
                } else {
                    document.getElementById('box-checkin').classList.remove('hidden');
                    document.getElementById('box-checkout').classList.add('hidden');
                }
            }
        }

        function efetuarLogin() {
            const digitado = document.getElementById('matricula-input').value.trim();
            if (!digitado) return alert('Digite seu ID.');

            const btn = document.getElementById('login-btn');
            const input = document.getElementById('matricula-input');
            btn.disabled = true;
            input.disabled = true;

            const colaborador = dbFuncionarios.find(f => f.id === digitado);

            if (colaborador) {
                localStorage.setItem('h_id', colaborador.id);
                localStorage.setItem('h_nome', colaborador.nome);
                gerenciarTelas();
            } else {
                alert('ID não encontrado. Fale com a supervisão.');
                btn.disabled = false;
                input.disabled = false;
            }
        }

        function selecionarHotel(nome) {
            hotelSelecionado = nome;
            if (nome === 'Santa Bárbara') {
                document.getElementById('card-sb').classList.add('selected');
                document.getElementById('card-res').classList.remove('selected');
            } else {
                document.getElementById('card-res').classList.add('selected');
                document.getElementById('card-sb').classList.remove('selected');
            }
        }

        function enviarRegistro(acao) {
            const id = localStorage.getItem('h_id');
            let hotel = acao === 'Check-in' ? hotelSelecionado : localStorage.getItem('h_hotel');

            if (!navigator.geolocation) return alert('Seu dispositivo não possui GPS ativo.');

            const btn = acao === 'Check-in' ? document.getElementById('btn-checkin') : document.getElementById('btn-checkout');
            btn.classList.add('loading');
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const dadosEnvio = {
                        matricula: id,
                        hotel: hotel,
                        acao: acao,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    };

                    fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dadosEnvio)
                    })
                    .then(() => {
                        localStorage.setItem('h_status', acao);
                        localStorage.setItem('h_hotel', hotel);
                        
                        setTimeout(() => {
                            btn.classList.remove('loading');
                            btn.disabled = false;
                            gerenciarTelas();
                        }, 400);
                    })
                    .catch(e => {
                        alert('Erro de rede ao salvar. Tente novamente.');
                        btn.classList.remove('loading');
                        btn.disabled = false;
                    });
                },
                (err) => {
                    alert('Ative a localização/GPS do seu celular para registrar.');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    </script>
</body>
</html>
